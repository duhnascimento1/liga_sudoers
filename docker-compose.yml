services:

  # Banco transacional
  postgres_liga_sudoers:
    image: postgres:16
    container_name: postgres_liga_sudoers
    environment:
      POSTGRES_USER: sudoers
      POSTGRES_PASSWORD: password
      POSTGRES_DB: liga_sudoers
    ports:
      - "5434:5432"
    volumes:
      - pgdata_liga_sudoers:/var/lib/postgresql

  # Data Warehouse
  postgres_liga_sudoers_dw:
    image: postgres:16
    container_name: postgres_liga_sudoers_dw
    environment:
      POSTGRES_USER: sudoers
      POSTGRES_PASSWORD: password
      POSTGRES_DB: liga_sudoers_dw
    ports:
      - "5433:5432"
    volumes:
      - pgdata_liga_sudoers_dw:/var/lib/postgresql

  # ETL
  etl_scripts:
    image: apache/hop-web:latest
    container_name: etl_scripts
    depends_on:
      - postgres_liga_sudoers
      - postgres_liga_sudoers_dw
    ports:
      - "8080:8080"
    environment:
      HOP_PROJECT_FOLDER: /files
      HOP_PROJECT_NAME: default
    volumes:
      - ./etl_sudoers:/files
    working_dir: /files

  # Metabase app
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
      MB_DB_HOST: metabase_db
    depends_on:
      - metabase_db

  # Banco do Metabase
  metabase_db:
    image: postgres:14
    container_name: metabase_db
    environment:
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
      POSTGRES_DB: metabase
    ports:
      - "5436:5432"
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
      - ./dashboard/metabase_db/metabase_backup.sql:/docker-entrypoint-initdb.d/metabase_backup.sql

volumes:
  pgdata_liga_sudoers:
  pgdata_liga_sudoers_dw:
  metabase_db_data: